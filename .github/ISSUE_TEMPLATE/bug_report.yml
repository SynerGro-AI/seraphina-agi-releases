name: 🐛 Bug Report
description: Something broke. Help us reproduce it.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. Issues here are triaged automatically; if
        the auto-fix bot can't solve it, a maintainer will mirror the issue to
        the private source repo for a code fix.

        **Do NOT post your license key, Stripe receipt URL, or any password.**

  - type: input
    id: version
    attributes:
      label: Seraphina AGI version
      description: Find this in the tray menu → About, or in `C:\Program Files\Seraphina AGI\VERSION`.
      placeholder: "1.8.0"
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: License tier
      options:
        - Free / unlicensed
        - Founders ($1/mo)
        - Personal
        - Family
        - Business
        - Enterprise
        - Not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs actual behavior.
      placeholder: |
        1. Clicked Activate License…
        2. Pasted my key SERA-XXXX-…
        3. Got "401 Unauthorized" instead of "Activated"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste anything from `%LOCALAPPDATA%\Seraphina AGI\logs\`. Redact license keys / personal info first.
      render: shell

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed license keys / API keys / personal info from this report.
          required: true
