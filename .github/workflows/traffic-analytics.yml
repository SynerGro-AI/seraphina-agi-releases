name: Traffic Analytics

on:
  workflow_dispatch:
    inputs:
      repos:
        description: "Space-separated repos (owner/repo). Leave blank for this repo only."
        required: false
        type: string
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run analytics supervisor
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ANALYTICS_TOKEN }}
          DEFAULT_REPO: ${{ github.repository }}
          INPUT_REPOS: ${{ inputs.repos }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "Secret GH_ANALYTICS_TOKEN is required (GitHub App installation token or fine-grained PAT)."
            exit 1
          fi
          python analytics/analytics_supervisor.py --db analytics/traffic_analytics.db

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traffic-analytics-db
          path: analytics/traffic_analytics.db
          if-no-files-found: warn
